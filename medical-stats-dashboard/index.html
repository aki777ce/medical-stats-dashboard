<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>救急受け入れ停止データ分析</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Chart.jsにはCSSファイルが不要 -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-fluid">
        <header class="bg-primary text-white p-3 mb-4">
            <h1>救急受け入れ停止データ分析</h1>
        </header>

        <div class="row">
            <div class="col-md-3">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>データアップロード</h5>
                    </div>
                    <div class="card-body">
                        <form id="upload-form">
                            <div class="mb-3">
                                <label for="file-upload" class="form-label">Excelファイルを選択</label>
                                <input type="file" class="form-control" id="file-upload" accept=".xlsx, .xls">
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">アップロード</button>
                                <button type="button" id="clear-data" class="btn btn-secondary">クリア</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <h5>フィルター</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="month-filter" class="form-label">月別フィルター</label>
                            <select class="form-select" id="month-filter">
                                <option value="all">すべての月</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="department-filter" class="form-label">診療科</label>
                            <select class="form-select" id="department-filter">
                                <option value="all">すべて</option>
                            </select>
                        </div>
                        <button id="apply-filters" class="btn btn-primary">適用</button>
                        <button id="reset-filters" class="btn btn-secondary">リセット</button>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5>平日日勤帯（8:00-17:00）ストップ時間統計</h5>
                            </div>
                            <div class="card-body">
                                <div class="stats-container">
                                    <div class="stat-item">
                                        <h6>総ストップ件数</h6>
                                        <div id="total-stops" class="stat-value">0</div>
                                    </div>
                                    <div class="stat-item">
                                        <h6>平日日勤帯ストップ件数</h6>
                                        <div id="workday-stops" class="stat-value">0</div>
                                    </div>
                                    <div class="stat-item">
                                        <h6>平日日勤帯ストップ時間（時間）</h6>
                                        <div id="workday-hours" class="stat-value">0</div>
                                    </div>
                                    <div class="stat-item">
                                        <h6>平日日勤帯ストップ率</h6>
                                        <div id="workday-percentage" class="stat-value">0%</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5>診療科別ストップ件数</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="department-chart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12">
                        <div class="card mb-4">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5>月別ストップ件数</h5>
                                <div class="btn-group" role="group">
                                    <button type="button" class="btn btn-sm btn-outline-primary active" id="show-all-data">全データ</button>
                                    <button type="button" class="btn btn-sm btn-outline-primary" id="show-workday-data">平日日動帯のみ</button>
                                    <button type="button" class="btn btn-sm btn-outline-primary" id="show-combined-data">両方表示</button>
                                </div>
                            </div>
                            <div class="card-body">
                                <canvas id="combined-monthly-chart" style="height: 300px;"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5>理由別ストップ件数</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="reason-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card mb-4">
                            <div class="card-header">
                                <h5>月別平日日勤帯ストップ時間</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="monthly-hours-chart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <h5>詳細データ</h5>
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <button id="export-csv" class="btn btn-sm btn-secondary">CSVエクスポート</button>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="workday-only-toggle">
                                <label class="form-check-label" for="workday-only-toggle">平日日勤帯のみ表示</label>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table id="data-table" class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>日付</th>
                                        <th>ストップ科</th>
                                        <th>停止時間</th>
                                        <th>理由</th>
                                        <th>平日日勤帯時間</th>
                                    </tr>
                                </thead>
                                <tbody id="data-tbody">
                                    <!-- データがここに入ります -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/locale/ja.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/japanese-holidays@1.0.10/lib/japanese-holidays.min.js"></script>
    <!-- モジュール化したJSファイル -->
    <script src="js/dataProcessor.js"></script>
    <script src="js/chartRenderer.js"></script>
    <script src="js/tableManager.js"></script>
    <script src="js/eventHandlers.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
